name: Deploy Landing to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1) Landing (Next.js) 빌드
      - run: npm ci
      - run: npm run build

      # 2) VitePress 매뉴얼 빌드
      - run: npm ci
        working-directory: docs-manual
      - run: npx vitepress build
        working-directory: docs-manual

      # 3) 두 빌드 결과 합치기: out/ + out/docs/
      - name: Merge landing + docs
        run: |
          mkdir -p out/docs
          cp -r docs-manual/.vitepress/dist/* out/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
